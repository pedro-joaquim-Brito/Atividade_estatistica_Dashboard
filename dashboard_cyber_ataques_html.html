<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Dashboard Ultra</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0b0b0b;--card:#141414;--accent:#ff1a1a;--text:#e6e6e6}
body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI}
.container{width:92%;margin:20px auto}
.navbar{display:flex;justify-content:space-between;padding:12px;background:#111}
.navbar a{color:white;margin-left:15px;cursor:pointer}
.section{display:none}.active{display:block}
.card{background:#141414;padding:14px;border-radius:10px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
canvas{background:#141414;border-radius:10px;margin-top:10px}
button{background:#ff1a1a;border:none;color:white;padding:8px;border-radius:6px;cursor:pointer}
input{padding:8px;background:#111;border:1px solid #333;color:white}
</style>
</head>
<body>

<div class="navbar">
<div>Cyber Dashboard Ultra</div>
<div>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('virus')">Vírus</a>
</div>
</div>

<div class="container">

<div id="home" class="section active">
<h2>Importar Dados</h2>
<input type="file" id="upload" accept=".csv,.xlsx">
<p>O sistema detecta automaticamente colunas e gera análise.</p>
</div>

<div id="dashboard" class="section">
<button onclick="exportCSV()">Exportar CSV</button>
<div class="grid" id="cards"></div>
<canvas id="linha"></canvas>
<canvas id="barras"></canvas>
<canvas id="boxplot"></canvas>
<div class="card" id="insights"></div>
</div>

<div id="virus" class="section">
<div class="card">
<input id="linkVirus" placeholder="Link ou hash">
<button onclick="abrirVirusTotal()">Analisar</button>
</div>
</div>

</div>

<script>
function showPage(p){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(p).classList.add('active')}

let data=[];
let linhaChart,barraChart,boxChart;

function detectarColunas(obj){
 const keys=Object.keys(obj);
 return {
  dia:keys.find(k=>k.toLowerCase().includes('dia')),
  ataques:keys.find(k=>k.toLowerCase().includes('ataq')),
  tipo:keys.find(k=>k.toLowerCase().includes('tipo')),
  tempo:keys.find(k=>k.toLowerCase().includes('tempo')),
  impacto:keys.find(k=>k.toLowerCase().includes('impact'))
 };
}

function stats(arr){
 const v=arr.map(d=>d.a);
 const n=v.length||1;
 const m=v.reduce((a,b)=>a+b,0)/n;
 const sd=Math.sqrt(v.reduce((s,x)=>s+(x-m)**2,0)/n);
 const sorted=[...v].sort((a,b)=>a-b);
 const q1=sorted[Math.floor(n*0.25)]||0;
 const q3=sorted[Math.floor(n*0.75)]||0;
 return {m:m.toFixed(2),sd:sd.toFixed(2),q1,q3};
}

function gerarInsights(s){
 return `Média de ${s.m} ataques/dia. Variabilidade ${s.sd<2?'baixa':'alta'}. Quartis indicam concentração entre ${s.q1} e ${s.q3}.`;
}

function render(){
 if(!data.length) return;
 const s=stats(data);
 document.getElementById('cards').innerHTML=`
 <div class='card'>Média ${s.m}</div>
 <div class='card'>Desvio ${s.sd}</div>
 <div class='card'>Q1 ${s.q1}</div>
 <div class='card'>Q3 ${s.q3}</div>`;

 const labels=data.map(d=>d.dia);
 const valores=data.map(d=>d.a);

 if(linhaChart)linhaChart.destroy();
 linhaChart=new Chart(linha,{type:'line',data:{labels,datasets:[{data:valores,borderColor:'red'}]}});

 const tipos=[...new Set(data.map(d=>d.t))];
 const freq=tipos.map(t=>data.filter(d=>d.t===t).length);
 if(barraChart)barraChart.destroy();
 barraChart=new Chart(barras,{type:'bar',data:{labels:tipos,datasets:[{data:freq,backgroundColor:'red'}]}});

 if(boxChart)boxChart.destroy();
 boxChart=new Chart(boxplot,{type:'bar',data:{labels:['Q1','Q3'],datasets:[{data:[s.q1,s.q3],backgroundColor:'red'}]}});

 document.getElementById('insights').innerText=gerarInsights(s);
}

// IMPORTAÇÃO
 document.getElementById('upload').addEventListener('change', function(e){
 const file=e.target.files[0];
 const reader=new FileReader();
 if(file.name.endsWith('.csv')){
 reader.onload=function(evt){
 const rows=evt.target.result.split('\n');
 const headers=rows[0].split(',');
 const colMap=detectarColunas(Object.fromEntries(headers.map(h=>[h,h])));
 data=rows.slice(1).map(r=>{
 const c=r.split(',');
 let obj={}; headers.forEach((h,i)=>obj[h]=c[i]);
 return {
  dia:+obj[colMap.dia],
  a:+obj[colMap.ataques],
  t:obj[colMap.tipo],
  tr:+obj[colMap.tempo],
  i:+obj[colMap.impacto]
 };
 });
 render();
 };
 reader.readAsText(file);
 } else {
 reader.onload=function(evt){
 const wb=XLSX.read(evt.target.result,{type:'binary'});
 const ws=wb.Sheets[wb.SheetNames[0]];
 const json=XLSX.utils.sheet_to_json(ws);
 const colMap=detectarColunas(json[0]);
 data=json.map(d=>({
  dia:+d[colMap.dia],
  a:+d[colMap.ataques],
  t:d[colMap.tipo],
  tr:+d[colMap.tempo],
  i:+d[colMap.impacto]
 }));
 render();
 };
 reader.readAsBinaryString(file);
 }
});

function exportCSV(){
 let csv="Dia,Ataques,Tipo,Tempo,Impacto\n";
 data.forEach(d=>csv+=`${d.dia},${d.a},${d.t},${d.tr},${d.i}\n`);
 const blob=new Blob([csv]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='dados.csv';a.click();
}

function abrirVirusTotal(){
 const v=document.getElementById('linkVirus').value;
 window.open('https://www.virustotal.com/gui/search/'+v);
}
</script>
</body>
</html>
